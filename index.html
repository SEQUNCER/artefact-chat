<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АРТЕФАКТ — Чат</title>
    <link rel="icon" type="image/jpeg" href="icon.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="chat-style.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
</head>
<body>
    <!-- Медиа viewer -->
    <div id="mediaViewer" class="media-viewer" onclick="if(event.target === this) closeMedia()">
        <button class="media-viewer-close" onclick="closeMedia()">&times;</button>
        <img id="viewerImage" class="media-viewer-content" src="" alt="">
        <video id="viewerVideo" class="media-viewer-content" controls style="display:none"></video>
    </div>

    <!-- Экран ввода ника -->
    <div id="loginScreen" class="login-screen">
        <div class="login-container">
            <div class="login-logo">
                <span class="logo">АРТЕФАКТ</span>
                <div class="logo-subtitle">Открытый чат</div>
            </div>
            <div class="login-form">
                <label class="form-label" for="usernameInput">Введите свой ник</label>
                <input type="text" id="usernameInput" class="form-input" placeholder="Ваш никнейм" maxlength="20" required>
                <button id="enterChatBtn" class="btn btn-primary">Войти в чат</button>
            </div>
            <div class="login-rules">
                <p>Правила: уважайте других, не спамьте, не используйте оскорбительные выражения.</p>
            </div>
        </div>
    </div>

    <!-- Основной чат -->
    <div id="chatScreen" class="chat-screen hidden">
        <header class="header">
            <div class="header-content">
                <div class="header-left">
                    <a href="index.html" class="logo">АРТЕФАКТ</a>
                    <div class="logo-subtitle">Чат</div>
                </div>
                <div class="header-controls">
                    <div id="onlineCount" class="online-count">Онлайн: <span>0</span></div>
                    <button id="logoutBtn" class="btn-add">Выйти</button>
                </div>
            </div>
        </header>

        <div class="chat-container">
            <div class="messages-container" id="messagesContainer">
            </div>
            <div class="input-area">
                <div class="input-tools">
                    <button id="attachBtn" class="tool-btn" title="Прикрепить файл">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                        </svg>
                    </button>
                    <button id="imageBtn" class="tool-btn" title="Отправить изображение">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21,15 16,10 5,21"/>
                        </svg>
                    </button>
                    <button id="videoBtn" class="tool-btn" title="Отправить видео">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="23,7 16,12 23,17 23,7"/>
                            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                        </svg>
                    </button>
                    <button id="voiceBtn" class="tool-btn" title="Записать голосовое">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
                            <path d="M19 10v2a7 7 0 01-14 0v-2"/>
                            <line x1="12" y1="19" x2="12" y2="23"/>
                            <line x1="8" y1="23" x2="16" y2="23"/>
                        </svg>
                    </button>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="messageInput" class="message-input" placeholder="Введите сообщение..." autocomplete="off">
                    <button id="sendBtn" class="send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22,2 15,22 11,13 2,9"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div id="filePreview" class="file-preview hidden">
            <div class="preview-content">
                <span id="fileName" class="file-name"></span>
                <button id="clearFileBtn" class="clear-btn">×</button>
            </div>
        </div>

        <div id="voiceModal" class="modal">
            <div class="modal-content voice-modal-content">
                <h3 class="modal-title">Запись голосового сообщения</h3>
                <div class="recording-visual">
                    <div class="recording-indicator"></div>
                    <span id="recordingTime">00:00</span>
                </div>
                <div class="modal-buttons">
                    <button id="stopRecordBtn" class="btn btn-primary">Остановить</button>
                    <button id="cancelRecordBtn" class="btn btn-secondary">Отмена</button>
                </div>
            </div>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
